name: WailsBuild

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**/*.md'
      - .gitignore
      - .editorconfig
  pull_request:
    paths-ignore:
      - '**/*.md'
      - .gitignore
      - .editorconfig


jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - uses: actions/cache@v3
      with:
        path: |
          ~\AppData\Local\go-build
          ~\go\pkg\mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - uses: actions/cache@v3
      with:
        path: C:\ProgramData\chocolatey\cache
        key: ${{ runner.os }}-choco-${{ hashFiles('.github/workflows/wailsBuild.yml') }}
        restore-keys: |
          ${{ runner.os }}-choco-

    - uses: actions/cache@v3
      with:
        path: ~\AppData\Roaming\npm
        key: ${{ runner.os }}-npm-global-${{ hashFiles('.github/workflows/wailsBuild.yml') }}
        restore-keys: |
          ${{ runner.os }}-npm-global-
          
    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.26.x

    - name: install wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: install node
      uses: actions/setup-node@v3
      with:
        node-version: 22
    - name: install dependencies
      run: choco install mingw make webview2-runtime 7zip.portable && npm install -g pnpm

    #- name: garble
    #  run: go install mvdan.cc/garble@latest   
      
    #- name: nsis
    # run: choco install nsis 
      
    #- name: upx
    #  run: choco install upx  
      
    - name: Stage SDL3.dll for build
      shell: pwsh
      run: |
        $url = "https://github.com/libsdl-org/SDL/releases/download/release-3.4.4/SDL3-3.4.4-win32-x64.zip"
        $zip = "$env:TEMP\SDL3.zip"
        Invoke-WebRequest -Uri $url -OutFile $zip
        Expand-Archive -Path $zip -DestinationPath "$env:TEMP\SDL3" -Force
        Copy-Item "$env:TEMP\SDL3\SDL3.dll" "cmd\webui\SDL3.dll" -Force

    - name: build
      run:  make build
    - name: get runtime dependencies
      run: go run tools/download_win_deps.go

    - name: Compress Build Artifacts
      shell: pwsh
      run: 7z a -tzip build-windows.zip build/bin

    - uses: actions/upload-artifact@v4
      with:
        name: debug-${{ runner.os }}
        path: build-windows.zip
      
      
      
      
      