name: WailsBuild

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**/*.md'
      - .gitignore
      - .editorconfig
  pull_request:
    paths-ignore:
      - '**/*.md'
      - .gitignore
      - .editorconfig

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/AppData/Local/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - uses: actions/cache@v3
      if: matrix.os == 'windows-latest'
      with:
        path: C:\ProgramData\chocolatey\cache
        key: ${{ runner.os }}-choco-${{ hashFiles('.github/workflows/wailsBuild.yml') }}
        restore-keys: |
          ${{ runner.os }}-choco-

    - uses: actions/cache@v3
      with:
        path: |
          ~/.npm
          ~/AppData/Roaming/npm
        key: ${{ runner.os }}-npm-global-${{ hashFiles('.github/workflows/wailsBuild.yml') }}
        restore-keys: |
          ${{ runner.os }}-npm-global-
          
    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.26.x

    - name: install wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: install node
      uses: actions/setup-node@v3
      with:
        node-version: 22

    - name: install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: choco install mingw make webview2-runtime 7zip.portable && npm install -g pnpm

    - name: install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config make
        npm install -g pnpm
      
    - name: Setup SDL3 (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: libsdl-org/setup-sdl@main
      id: sdl
      with:
        version: 3-latest
        install-linux-dependencies: true

    - name: Stage SDL3.dll for build (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $url = "https://github.com/libsdl-org/SDL/releases/download/release-3.4.4/SDL3-3.4.4-win32-x64.zip"
        $zip = "$env:TEMP\SDL3.zip"
        Invoke-WebRequest -Uri $url -OutFile $zip
        Expand-Archive -Path $zip -DestinationPath "$env:TEMP\SDL3" -Force
        Copy-Item "$env:TEMP\SDL3\SDL3.dll" "cmd\webui\SDL3.dll" -Force

    - name: build
      env:
        LD_LIBRARY_PATH: ${{ steps.sdl.outputs.prefix }}/lib
      run:  make

    - name: get runtime dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: go run tools/download_win_deps.go

    - name: Compress Build Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: 7z a -tzip build-windows.zip build/bin/

    - name: Compress Build Artifacts (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: tar -czf build-linux.tar.gz -C build/bin .

    - name: Upload Windows Artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: build-windows
        path: build-windows.zip

    - name: Upload Linux Artifacts
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: build-linux
        path: build-linux.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
    - name: Download all builds
      uses: actions/download-artifact@v4
      with:
        pattern: build-*
        merge-multiple: true

    - name: Create Nightly Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASE_DATE=$(date +'%Y-%m-%d')
        gh release delete nightly --yes --cleanup-tag || true
        gh release create nightly build-windows.zip build-linux.tar.gz --title "OngoPlayer nightly build $RELEASE_DATE" --notes "Automated nightly build for $RELEASE_DATE" --prerelease