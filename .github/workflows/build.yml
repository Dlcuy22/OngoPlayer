name: Build Binaries

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-webui-linux:
    name: Build WebUI (Wails) Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: cmd/webui/frontend
        run: pnpm install

      - name: Build C DSP Library
        run: |
          mkdir -p build/webui-linux
          gcc -O3 -shared -ffast-math -o build/webui-linux/stelle_dsp.so \
            Audioengine/StelleEngine/dsp/stelle_dsp.c

      - name: Build WebUI (Wails)
        run: |
          cd cmd/webui
          wails build -platform linux/amd64 \
            -o ../../build/webui-linux/Ongoplayer-webui

      - name: Upload WebUI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ongoplayer-webui-linux
          
  build-webui-windows:
    name: Build WebUI (Wails) Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Set up MSYS2 (UCRT64) for CGo
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-opusfile
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-libogg
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-libvorbis
            mingw-w64-ucrt-x86_64-mpg123

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: cmd/webui/frontend
        run: pnpm install

      - name: Build C DSP Library
        shell: msys2 {0}
        run: |
          mkdir -p build/webui-win
          gcc -O3 -shared -ffast-math -o build/webui-win/stelle_dsp.dll \
            Audioengine/StelleEngine/dsp/stelle_dsp.c

      - name: Build WebUI (Wails)
        shell: msys2 {0}
        run: |
          export PATH="/ucrt64/bin:$HOME/go/bin:$PATH"
          export CGO_ENABLED=1
          cd cmd/webui
          wails build -platform windows/amd64 \
            -o ../../build/webui-win/Ongoplayer-webui.exe

      - name: Stage Runtime DLLs
        shell: msys2 {0}
        run: |
          ucrt_bin="/ucrt64/bin"
          for dll in libopus-0.dll libopusfile-0.dll libogg-0.dll \
                     libvorbis-0.dll libvorbisfile-3.dll \
                     libmpg123-0.dll SDL3.dll; do
            cp "$ucrt_bin/$dll" build/webui-win/
          done

      - name: Upload WebUI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ongoplayer-webui-windows
          path: build/webui-win/
          if-no-files-found: warn
