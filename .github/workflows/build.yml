name: Build Binaries

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows GUI"
            os: windows
            arch: amd64
            tags: ""
            path: "./cmd/gui"
            output: "OngoPlayer-gui-windows.exe"
            install_deps: false

          - name: "Windows TUI"
            os: windows
            arch: amd64
            tags: ""
            path: "./cmd/tui"
            output: "OngoPlayer-tui-windows.exe"
            install_deps: false

          - name: "Linux X11 OpenGL GUI"
            os: linux
            arch: amd64
            tags: "-tags nowayland"
            path: "./cmd/gui"
            output: "OngoPlayer-gui-linux-x11gl"
            install_deps: true

          - name: "Linux Wayland OpenGL GUI"
            os: linux
            arch: amd64
            tags: "-tags nox11"
            path: "./cmd/gui"
            output: "OngoPlayer-gui-linux-wayopengl"
            install_deps: true

          - name: "Linux Wayland Vulkan GUI"
            os: linux
            arch: amd64
            tags: "-tags nox11,noopengl"
            path: "./cmd/gui"
            output: "OngoPlayer-gui-linux-wayvulkan"
            install_deps: true

          - name: "Linux TUI"
            os: linux
            arch: amd64
            tags: ""
            path: "./cmd/tui"
            output: "OngoPlayer-tui-linux"
            install_deps: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install Linux Dependencies
        if: matrix.install_deps == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev libasound2-dev

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build ${{ matrix.tags }} -o build/${{ matrix.output }} ${{ matrix.path }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
